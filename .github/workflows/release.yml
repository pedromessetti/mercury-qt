# Mercury-Qt CD Pipeline - Generate Release
#
# Triggers:
#   - Manually via workflow_dispatch (provide the new version to release)
#
# Steps:
#   1. Update debian/changelog with new section (version header, release bullets
#      with all PR titles since the last tag, and maintainer/date footer)
#   2. Commit and push those changes: "Updates for release X.Y.Z"
#   3. Build the Linux source bundle (make linux-bundle) and zip it
#   4. Create a GitHub release with the zip attached (gh release create)

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true
        type: string

jobs:
  release:
    name: Release Mercury-Qt v${{ inputs.version }}
    runs-on: ubuntu-latest
    container: debian:trixie
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: '${VERSION}' — expected X.Y.Z (e.g. 0.4.0)"
            exit 1
          fi

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            gh \
            make \
            zip

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git safe directory
        run: git config --global --add safe.directory /__w/mercury-qt/mercury-qt

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Collect PR titles since last tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null) || {
            echo "No tags found — falling back to initial commit"
            LAST_TAG=$(git rev-list --max-parents=0 HEAD)
          }
          echo "Collecting PRs since: ${LAST_TAG}"

          # Get the ISO timestamp of the tag's commit so we can query the API
          LAST_TAG_DATE=$(git log -1 --format="%cI" "${LAST_TAG}")
          echo "Tag commit date: ${LAST_TAG_DATE}"

          # Query GitHub directly for PRs merged into main after that date,
          # sorted oldest-first so the changelog order matches the release history.
          PR_TITLES=$(gh pr list \
            --repo pedromessetti/mercury-qt \
            --state merged \
            --base main \
            --search "merged:>${LAST_TAG_DATE}" \
            --limit 200 \
            --json title,mergedAt \
            --jq 'sort_by(.mergedAt) | .[].title')

          PR_ENTRIES=""
          while IFS= read -r title; do
            [[ -z "$title" ]] && continue
            title="${title%.}"  # strip trailing period if present
            PR_ENTRIES="${PR_ENTRIES}  * ${title}.\n"
          done <<< "$PR_TITLES"

          {
            echo 'PR_ENTRIES<<EOF'
            printf '%b' "$PR_ENTRIES"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Update debian/changelog
        run: |
          VERSION="${{ inputs.version }}"
          DATE=$(date -R)

          {
            printf 'mercury-qt (%s) unstable; urgency=medium\n\n' "$VERSION"
            printf '  * Release %s.\n' "$VERSION"
            printf '%b' "$PR_ENTRIES"
            printf '\n\n -- Rafael Diniz <rafael@riseup.net>  %s\n\n' "$DATE"
          } | cat - debian/changelog > debian/changelog.tmp
          mv debian/changelog.tmp debian/changelog

      - name: Commit and push release files
        run: |
          git add debian/changelog
          git commit -m "Updates for release ${{ inputs.version }}"
          git push origin main

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --repo pedromessetti/mercury-qt \
            --target main \
            --generate-notes
